<mat-toolbar color="primary" class="navbar">
  <div class="navbar-content">
    <!-- Logo -->
    <div class="logo-section">
      <a routerLink="/" class="logo-link">
        <img 
          src="assets/Martine_Richard_Interior_Design_Logo.png" 
          alt="Martine Richard Interior Design" 
          class="logo"
        />
      </a>
    </div>

    <!-- Desktop Navigation Menu -->
    <nav class="nav-menu desktop-nav">
      <a 
        mat-button 
        routerLink="/about" 
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: false }"
      >
        About Us
      </a>

      <!-- Services with Dropdown -->
      <div class="menu-item" [matMenuTriggerFor]="servicesMenu">
        <button 
          mat-button
          [matMenuTriggerFor]="servicesMenu"
          class="services-btn"
        >
          Services Offered
          <mat-icon>arrow_drop_down</mat-icon>
        </button>
      </div>

      <a 
        mat-button 
        routerLink="/portfolio" 
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: false }"
      >
        Portfolio
      </a>

      <a 
        mat-button 
        routerLink="/contact" 
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: false }"
      >
        Contact Us
      </a>
    </nav>

    <!-- Mobile Menu Button -->
    <button 
      mat-icon-button 
      (click)="toggleMobileMenu()" 
      class="mobile-menu-btn"
      [attr.aria-label]="'Toggle navigation menu'"
    >
      <mat-icon>{{ mobileMenuOpen ? 'close' : 'menu' }}</mat-icon>
    </button>
  </div>

  <!-- Mobile Navigation Menu -->
  <nav class="mobile-nav" *ngIf="mobileMenuOpen" [@slideDown]>
    <a 
      mat-button 
      routerLink="/about" 
      routerLinkActive="active"
      (click)="mobileMenuOpen = false"
      class="mobile-nav-item"
    >
      About Us
    </a>

    <div class="mobile-submenu">
      <button 
        mat-button 
        (click)="toggleServicesSubmenu()"
        class="mobile-nav-item"
      >
        Services Offered
        <mat-icon>{{ servicesOpen ? 'expand_less' : 'expand_more' }}</mat-icon>
      </button>
      
      <div class="mobile-services" *ngIf="servicesOpen" [@slideDown]>
        <a 
          mat-button 
          *ngFor="let service of services"
          (click)="mobileMenuOpen = false"
          class="mobile-service-item"
        >
          {{ service }}
        </a>
      </div>
    </div>

    <a 
      mat-button 
      routerLink="/portfolio" 
      routerLinkActive="active"
      (click)="mobileMenuOpen = false"
      class="mobile-nav-item"
    >
      Portfolio
    </a>

    <a 
      mat-button 
      routerLink="/contact" 
      routerLinkActive="active"
      (click)="mobileMenuOpen = false"
      class="mobile-nav-item"
    >
      Contact Us
    </a>
  </nav>
</mat-toolbar>

<!-- Services Dropdown Menu (Desktop) -->
<mat-menu #servicesMenu="matMenu" class="services-menu">
  <a 
    mat-menu-item 
    *ngFor="let service of services"
    routerLink="/services"
  >
    {{ service }}
  </a>
</mat-menu>
